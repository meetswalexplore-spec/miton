<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d6efd">

<title>সার্ভারকপি ড্যাশবোর্ড</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://fonts.maateen.me/solaiman-lipi/font.css">
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.4.1/css/responsive.dataTables.min.css">

<style type="text/css">
/* গ্লোবাল এবং স্মার্ট UI স্টাইল */
body {
    font-family: 'SolaimanLipi', Arial, sans-serif !important;
    background-color: #f4f6f9;
    color: #333;
    margin: 0;
    overflow-x: hidden;
}

/* সাইডবার লেআউট আপগ্রেড */
.sidebar {
    width: 260px;
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    padding-top: 20px;
    z-index: 1000;
    transition: all 0.3s ease;
    box-shadow: 4px 0 10px rgba(0,0,0,0.1);
}

/* মেইন কনটেন্ট এরিয়া */
.main-content {
    margin-left: 260px;
    padding: 30px;
    transition: all 0.3s ease;
}

.sidebar a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    color: #94a3b8;
    text-decoration: none;
    transition: all 0.3s ease;
    font-size: 15px;
    font-weight: 500;
}

.sidebar a:hover {
    background: rgba(255, 255, 255, 0.05);
    color: #fff;
    padding-left: 25px;
}

.sidebar a.active {
    background: #0d6efd;
    color: #fff;
    font-weight: bold;
    border-radius: 0 50px 50px 0;
    margin-right: 10px;
    box-shadow: 0 4px 12px rgba(13, 110, 253, 0.3);
}

/* "সার্ভারকপি" এবং "সার্চ করুন" বক্সের অভিন্ন CSS (Same Style) */
.server-copy-title, button[type="submit"] {
    width: 100%;
    max-width: 450px;
    padding: 14px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    transition: all 0.3s ease;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 auto 25px auto;
}

/* বাটন এবং টাইটেলের হোভার ইফেক্ট */
button[type="submit"]:hover, .server-copy-title:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 15px rgba(16, 185, 129, 0.3);
    cursor: pointer;
}

/* ফর্ম ও কনটেইনার ডিজাইন */
.plans {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

.container {
    max-width: 450px;
    width: 100%;
    background: #ffffff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    border: 1px solid #e2e8f0;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
    font-size: 14px;
}

.form-control, input[type="text"] {
    width: 100%;
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 15px;
    transition: all 0.3s ease;
    background-color: #f8fafc;
}

.form-control:focus, input[type="text"]:focus {
    border-color: #0d6efd;
    box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
    background-color: #fff;
    outline: none;
}

/* ভার্সন সুইচার রেডিও বাটন */
.versiondiv {
    display: flex;
    justify-content: center;
    gap: 15px;
    width: 100%;
    max-width: 450px;
}

.option-label {
    flex: 1;
    text-align: center;
    cursor: pointer;
    font-weight: 600;
}

.option-label input {
    display: none;
}

.option-label span {
    display: block;
    padding: 12px;
    border: 2px solid #cbd5e1;
    border-radius: 8px;
    background: #fff;
    color: #64748b;
    transition: all 0.2s ease;
}

.option-label input:checked + span {
    background: #0d6efd;
    color: #fff;
    border-color: #0d6efd;
    box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
}

/* লোডার ওভারলে */
#loaderOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: none;
    background: rgba(255, 255, 255, 0.85);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    backdrop-filter: blur(5px);
}

.spinner {
    border: 5px solid #e2e8f0;
    border-top: 5px solid #0d6efd;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* রেসপন্সিভ লেআউট ট্রিকস */
@media (max-width: 992px) {
    .sidebar {
        left: -260px;
    }
    .sidebar.active {
        left: 0;
    }
    .main-content {
        margin-left: 0;
        padding: 15px;
    }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebarMenu">
    <a href="#" class="active"><i class="fa-solid fa-house"></i> হোম (Home)</a>
    <a href="#"><i class="fa-solid fa-server"></i> সার্ভারকপি (Server Copy)</a>
    <a href="#"><i class="fa-solid fa-layer-group"></i> আমাদের সেবাসমূহ (Services)</a>
    <a href="#"><i class="fa-solid fa-circle-info"></i> আমাদের সম্পর্কে (About Us)</a>
    <a href="#"><i class="fa-solid fa-address-book"></i> যোগাযোগ করুন (Contact)</a>
</div>

<div class="main-content">
    
    <div class="plans text-center">
        <h1 class="server-copy-title"><i class="fa-solid fa-server"></i> সার্ভারকপি</h1>
    </div>

    <div class="plans">
        <div class="versiondiv">
            <label class="option-label">
                <input type="radio" name="version_type" value="official" checked>
                <span>QR কোড ছাড়া</span>
            </label>
            <label class="option-label">
                <input type="radio" name="version_type" value="unofficial">
                <span>QR কোড সহ</span>
            </label>
        </div>
    </div>

    <div class="plans">
        <div class="container">
            <form id="nidForm" autocomplete="off">
                <div class="form-group">
                    <label>কোন API ব্যবহার করবেন?</label>
                    <select id="apiSelect" class="form-control">
                        <option value="1" selected>API 1 (পিন নম্বরসহ)</option>
                        <option value="2">API 2 (পিন নম্বর ছাড়া)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="nid">NID নম্বর দিন (১০ বা ১৭ সংখ্যার): <br>
                        <span style="font-size:12px; color:#64748b; font-weight:normal;">
                            (১৩ সংখ্যার ভোটার নম্বর হলে জন্মসালটি সামনে দিয়ে ১৭ ডিজিট বানিয়ে সাবমিট দিন)
                        </span>
                    </label>
                    <input id="nid" name="nid" type="text" placeholder="যেমন: 1987654321" required />
                </div>
                
                <div class="form-group">
                    <label for="dob">জন্ম তারিখ দিন (YYYY-MM-DD):</label>
                    <input id="dob" name="dob" type="text" placeholder="যেমন: 1990-01-01" required />
                </div>
                
                <button type="submit" id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> সার্চ করুন</button>
            </form>
        </div>
    </div>

</div>

<div id="loaderOverlay">
    <div class="spinner"></div>
    <div style="margin-top:15px; font-weight:bold; color:#0d6efd;">লোড হচ্ছে, অনুগ্রহ করে অপেক্ষা করুন...</div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.4.1/js/dataTables.responsive.min.js"></script>

<script>
$(document).ready(function () {
  // লোডার কন্ট্রোল ফাংশনস
  function showLoader() {
    $("#loaderOverlay").css("display", "flex").hide().fadeIn(200);
  }
  function hideLoader() {
    $("#loaderOverlay").fadeOut(200);
  }

  // API কনফিগারেশন 
  const API_1_URL = "api/Auto_Servercopy_api1.php";
  const API_2_URL = "api/Auto_Servercopy_api2.php";
  const api1Price = 65;
  const api2Price = 40;

  function getSelectedApiInfo() {
    const apiVal = ($("#apiSelect").val() || "2").toString();
    if (apiVal === "1") {
      return { apiVal: "1", url: API_1_URL, price: api1Price };
    }
    return { apiVal: "2", url: API_2_URL, price: api2Price };
  }

  // ফর্ম সাবমিট হ্যান্ডলার (অপরিবর্তিত ব্যাকএন্ড লজিক)
  $("#nidForm").on("submit", function (e) {
    e.preventDefault();

    const nid = $("#nid").val().trim();
    const dob = $("#dob").val().trim();
    const version_type = $("input[name='version_type']:checked").val();
    const apiInfo = getSelectedApiInfo();
    const pagePrice = apiInfo.price;

    if (!nid || !dob) {
      Swal.fire("⚠️ সতর্কতা", "অনুগ্রহ করে NID এবং জন্মতারিখ দিন!", "warning");
      return;
    }

    Swal.fire({
      title: "আপনি নিশ্চিত?",
      html: `অটো সার্ভারকপি ডাউনলোড করতে <b>${pagePrice} টাকা</b> কাটা হবে।`,
      icon: "question",
      showCancelButton: true,
      confirmButtonText: "হ্যা! ডাউনলোড করবো",
      cancelButtonText: "না! বাতিল",
      confirmButtonColor: "#28a745",
      cancelButtonColor: "#dc3545",
      reverseButtons: true
    }).then((result) => {
      if (result.isConfirmed) {
        showLoader();

        $.ajax({
          url: apiInfo.url,
          type: "POST",
          dataType: "json",
          data: { nid: nid, dob: dob, version_type: version_type },
          success: function (res) {
            hideLoader();
            if (res.Success) {
              Swal.fire({
                title: "✅ সফল!",
                html: `<p>মূল্য: <b>${res.price}</b> টাকা</p><p>ব্যালেন্স আগে: <b>${res.balance_before}</b><br>পরে: <b>${res.balance_after}</b></p>`,
                icon: "success",
                confirmButtonText: "📥 PDF ডাউনলোড করুন",
              }).then(() => {
                if (res.redirect) {
                  window.location.href = res.redirect;
                } else {
                  Swal.fire("❌ ত্রুটি", "ডাউনলোড লিংক পাওয়া যায়নি!", "error");
                }
              });
            } else {
              Swal.fire("❌ ত্রুটি", res.error_message || "API থেকে ব্যর্থ উত্তর এসেছে।", "error");
            }
          },
          error: function (xhr, status, error) {
            hideLoader();
            Swal.fire("🚫 ত্রুটি", "সার্ভারে সমস্যা হয়েছে: " + error, "error");
          },
        });
      }
    });
  });
});
</script>
</body>
</html>
